<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - Academia JJB</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: white;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      text-align: center;
    }

    p {
      text-align: center;
      color: #6b7280;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      margin-top: 14px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .mensaje {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      background: #e5e7eb;
      font-size: 14px;
      text-align: center;
    }

    .links {
      margin-top: 18px;
      text-align: center;
    }

    .links a {
      color: #2563eb;
      text-decoration: none;
      font-size: 14px;
      margin: 0 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Crear cuenta</h1>
    <p>Registro de alumno - Academia JJB</p>

    <label for="nombre">Nombre</label>
    <input type="text" id="nombre" placeholder="Tu nombre" />

    <label for="apellido">Apellido</label>
    <input type="text" id="apellido" placeholder="Tu apellido" />

    <label for="email">Gmail</label>
    <input type="email" id="email" placeholder="tuemail@gmail.com" />

    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="Tu contraseña" />

    <button id="btnRegister">Registrarme</button>

    <div id="mensaje" class="mensaje">Completá tus datos para registrarte.</div>

    <div class="links">
      <a href="/login.html">Ir a login</a>
      <a href="/">Inicio</a>
    </div>
  </div>

  <script>
    const nombre = document.getElementById("nombre");
    const apellido = document.getElementById("apellido");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const btnRegister = document.getElementById("btnRegister");
    const mensaje = document.getElementById("mensaje");

    async function registrarUsuario() {
      const datos = {
        nombre: nombre.value.trim(),
        apellido: apellido.value.trim(),
        email: email.value.trim(),
        password: password.value.trim()
      };

      if (!datos.nombre || !datos.apellido || !datos.email || !datos.password) {
        mensaje.textContent = "Completá todos los campos.";
        return;
      }

      try {
        const respuesta = await fetch("/api/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(datos)
        });

        const data = await respuesta.json();

        if (!respuesta.ok) {
          mensaje.textContent = data.error || "No se pudo registrar.";
          return;
        }

        mensaje.textContent = "Usuario registrado correctamente.";
        nombre.value = "";
        apellido.value = "";
        email.value = "";
        password.value = "";
      } catch (error) {
        mensaje.textContent = "Error al conectar con el servidor.";
        console.error(error);
      }
    }

    btnRegister.addEventListener("click", registrarUsuario);
  </script>
</body>
</html>
