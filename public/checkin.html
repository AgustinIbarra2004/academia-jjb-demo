<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check-in QR - Academia JJB</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    header {
      background: #111827;
      color: white;
      padding: 20px;
      text-align: center;
    }

    main {
      max-width: 760px;
      margin: 30px auto;
      padding: 0 16px;
    }

    .volver {
      display: inline-block;
      margin-bottom: 16px;
      text-decoration: none;
      color: #2563eb;
      font-weight: bold;
    }

    .usuario-actual,
    .mensaje {
      margin-bottom: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
    }

    .usuario-actual {
      background: #dbeafe;
      color: #1e3a8a;
    }

    .mensaje {
      background: #e5e7eb;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    select,
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
    }

    button {
      margin-top: 14px;
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 12px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .btn-danger {
      background: #dc2626;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    #reader {
      margin-top: 18px;
      width: 100%;
      overflow: hidden;
      border-radius: 12px;
    }

    .ayuda {
      color: #6b7280;
      font-size: 14px;
      margin-top: 10px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <header>
    <h1>Check-in con QR</h1>
    <p>Academia JJB</p>
  </header>

  <main>
    <a class="volver" href="/">← Volver al inicio</a>

    <div id="usuarioActual" class="usuario-actual"></div>
    <div id="mensaje" class="mensaje">Cargando...</div>

    <div class="card">
      <label for="turno">Seleccionar turno</label>
      <select id="turno"></select>

      <p class="ayuda">
        Tocá “Iniciar cámara”, apuntá al QR pegado en la academia y el sistema hará el check-in automáticamente.
      </p>

      <button id="btnIniciar">Iniciar cámara</button>
      <button id="btnDetener" class="btn-danger">Detener cámara</button>

      <div id="reader"></div>

      <label for="codigoManual">Código manual</label>
      <input
        type="text"
        id="codigoManual"
        value="JJB-ACADEMIA-2026"
        placeholder="Código QR"
      />

      <button id="btnManual">Confirmar manualmente</button>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

  <script>
    const mensaje = document.getElementById("mensaje");
    const usuarioActual = document.getElementById("usuarioActual");
    const selectTurno = document.getElementById("turno");
    const btnIniciar = document.getElementById("btnIniciar");
    const btnDetener = document.getElementById("btnDetener");
    const btnManual = document.getElementById("btnManual");
    const codigoManual = document.getElementById("codigoManual");

    const usuarioGuardado = localStorage.getItem("usuario");
    const token = localStorage.getItem("token");

    if (!usuarioGuardado || !token) {
      alert("Tenés que iniciar sesión primero.");
      window.location.href = "/login.html";
    }

    const usuario = JSON.parse(usuarioGuardado);
    usuarioActual.textContent = `Usuario actual: ${usuario.nombre} ${usuario.apellido}`;

    let html5QrCode = null;
    let camaraActiva = false;

    async function cargarTurnos() {
      mensaje.textContent = "Cargando turnos...";

      try {
        const respuesta = await fetch("/api/turnos");
        const turnos = await respuesta.json();

        selectTurno.innerHTML = turnos.map(turno => `
          <option value="${turno.id}">
            Turno ${turno.id} - ${turno.fecha} ${turno.hora}
          </option>
        `).join("");

        mensaje.textContent = "Seleccioná un turno y escaneá el QR.";
      } catch (error) {
        mensaje.textContent = "Error al cargar turnos.";
        console.error(error);
      }
    }

    async function hacerCheckin(codigoQr) {
      const turnoId = Number(selectTurno.value);

      if (!turnoId || !codigoQr) {
        mensaje.textContent = "Faltan datos para hacer check-in.";
        return;
      }

      try {
        const respuesta = await fetch("/api/checkin", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({
            turno_id: turnoId,
            codigo_qr: codigoQr
          })
        });

        const data = await respuesta.json();

        if (!respuesta.ok) {
          mensaje.textContent = data.error || "No se pudo hacer check-in.";
          return;
        }

        mensaje.textContent = `Check-in registrado correctamente ✅ Turno ${turnoId}`;

        if (camaraActiva) {
          await detenerCamara();
        }
      } catch (error) {
        mensaje.textContent = "Error al conectar con el servidor.";
        console.error(error);
      }
    }

    async function iniciarCamara() {
      if (camaraActiva) return;

      mensaje.textContent = "Iniciando cámara...";

      try {
        html5QrCode = new Html5Qrcode("reader");

        await html5QrCode.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: { width: 250, height: 250 }
          },
          async (decodedText) => {
            mensaje.textContent = `QR detectado: ${decodedText}`;
            await hacerCheckin(decodedText);
          },
          () => {}
        );

        camaraActiva = true;
        mensaje.textContent = "Cámara activa. Apuntá al QR.";
      } catch (error) {
        mensaje.textContent = "No se pudo iniciar la cámara. Revisá permisos o usá HTTPS.";
        console.error(error);
      }
    }

    async function detenerCamara() {
      if (!html5QrCode || !camaraActiva) return;

      try {
        await html5QrCode.stop();
        html5QrCode.clear();
        camaraActiva = false;
        mensaje.textContent = "Cámara detenida.";
      } catch (error) {
        console.error(error);
      }
    }

    btnIniciar.addEventListener("click", iniciarCamara);
    btnDetener.addEventListener("click", detenerCamara);

    btnManual.addEventListener("click", () => {
      hacerCheckin(codigoManual.value.trim());
    });

    cargarTurnos();
  </script>
</body>
</html>
